<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Baseball Run Pool</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;-webkit-text-size-adjust:100%}
button{cursor:pointer;border:none;border-radius:8px;font-weight:700;transition:opacity .15s;-webkit-tap-highlight-color:transparent}
button:hover{opacity:.85}
button:disabled{opacity:.4;cursor:not-allowed}
input,select{background:#0f172a;color:#f1f5f9;border:1px solid #334155;border-radius:8px;padding:9px 12px;font-size:16px;width:100%}
input:focus,select:focus{outline:2px solid #2563eb}
.card{background:#1e293b;border-radius:12px;padding:16px}
.tab-btn{padding:8px 12px;border-radius:8px;font-weight:700;font-size:13px;background:#1e293b;color:#f1f5f9}
.tab-btn.active{background:#2563eb}
.flash{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;padding:12px 20px;border-radius:10px;font-weight:700;z-index:999;box-shadow:0 4px 20px #0008;font-size:14px;width:90%;max-width:400px;text-align:center}
table{width:100%;border-collapse:collapse}
th{background:#0f172a;padding:9px 10px;text-align:left;font-size:12px;color:#94a3b8;font-weight:700}
td{padding:10px;border-top:1px solid #0f172a;font-size:13px}
tr:nth-child(even) td{background:#1a2744}
.spinner{display:inline-block;width:18px;height:18px;border:3px solid #334155;border-top-color:#38bdf8;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Nav */
nav{background:#1e293b;border-bottom:2px solid #2563eb;padding:0;position:sticky;top:0;z-index:100}
.nav-top{display:flex;align-items:center;padding:10px 14px;gap:8px}
.nav-title{font-weight:800;font-size:18px;color:#38bdf8}
.nav-hamburger{background:none;border:1px solid #334155;color:#f1f5f9;padding:6px 10px;border-radius:6px;font-size:18px;line-height:1;display:none}

/* Desktop nav — horizontal buttons */
.nav-desktop{display:flex;align-items:center;gap:8px;padding:0 14px 10px;flex-wrap:wrap}
.nav-btn{padding:8px 14px;border-radius:6px;background:#1e293b;color:#f1f5f9;font-size:13px;font-weight:700;border:1px solid #334155}
.nav-btn.active{background:#2563eb;border-color:#2563eb}
.logout-btn{margin-left:auto;background:#dc2626;color:#fff;padding:8px 14px;border-radius:6px;font-size:13px;font-weight:700;border:none}

/* Mobile nav — hamburger dropdown */
.nav-links{display:none;flex-direction:column;padding:8px 14px 12px;gap:6px;border-top:1px solid #1e3a5f}
.nav-links.open{display:flex}
.nav-links .nav-btn{width:100%;text-align:left;padding:10px 14px}
.nav-links .logout-btn{width:100%;text-align:left;padding:10px 14px;margin-left:0}

/* Switch to hamburger on small screens */
@media(max-width:640px){
  .nav-hamburger{display:block}
  .nav-desktop{display:none}
}

/* App container */
#app{max-width:1020px;margin:0 auto;padding:12px}

/* Team grid - 2 columns on mobile */
.team-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:500px){.team-grid{grid-template-columns:repeat(auto-fill,minmax(195px,1fr))}}
.team-btn{padding:10px 12px;border-radius:8px;text-align:left;font-size:13px;font-weight:600;background:#0f172a;color:#f1f5f9;border-left:3px solid #2563eb;width:100%}
.team-btn.taken{background:#1e1e2e;color:#475569;border-left-color:#ef4444}
.team-btn.used{background:#1e1e2e;color:#475569;border-left-color:#7c3aed}
.team-btn:disabled{cursor:not-allowed}

/* Responsive tables */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px}

/* Admin tabs scroll horizontally on mobile */
.admin-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.admin-tabs::-webkit-scrollbar{display:none}

/* Stack flex rows on mobile */
.flex-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* Responsive helpers */
.hide-mobile { display:inline; }
.show-mobile { display:none; }
@media(max-width:640px){
  .hide-mobile { display:none; }
  .show-mobile { display:inline; }
  .card{padding:14px}
  td{padding:8px 6px;font-size:12px}
  th{padding:8px 6px;font-size:11px}
  h2{font-size:18px}
  h3{font-size:15px}
}
</style>
</head>
<body>
<nav id="nav"></nav>
<div id="flash-area"></div>
<div id="app"><div style="text-align:center;padding:60px;color:#94a3b8"><span class="spinner"></span> Loading...</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

var firebaseConfig = {
  apiKey: "AIzaSyCY2yCDv1BjiMGwitmZwarjlx4wLSyXNYQ",
  authDomain: "baseball-runs-pool.firebaseapp.com",
  projectId: "baseball-runs-pool",
  storageBucket: "baseball-runs-pool.firebasestorage.app",
  messagingSenderId: "78861263916",
  appId: "1:78861263916:web:73a7fc2ba45676813b9d89"
};

var fbApp = initializeApp(firebaseConfig);
var db = getFirestore(fbApp);
var POOL_DOC = doc(db, "pool", "main");
var ADMIN_PW = "commissioner";
var MLB_TEAMS = [
  "Arizona Diamondbacks","Atlanta Braves","Baltimore Orioles","Boston Red Sox",
  "Chicago Cubs","Chicago White Sox","Cincinnati Reds","Cleveland Guardians",
  "Colorado Rockies","Detroit Tigers","Houston Astros","Kansas City Royals",
  "Los Angeles Angels","Los Angeles Dodgers","Miami Marlins","Milwaukee Brewers",
  "Minnesota Twins","New York Mets","New York Yankees","Oakland Athletics",
  "Philadelphia Phillies","Pittsburgh Pirates","San Diego Padres","San Francisco Giants",
  "Seattle Mariners","St. Louis Cardinals","Tampa Bay Rays","Texas Rangers",
  "Toronto Blue Jays","Washington Nationals"
];
var ROTATION = [0,5,4,2,7,1,3,6];
var appState = { data: null, user: null, view: "home" };
var scheduleCache = {};
var liveRunsCache = {};
var orderState = [];

function defaultData() {
  return { seasonStart:"", weekCount:26, players:[], weeks:{} };
}

async function saveData(d) {
  appState.data = d;
  await setDoc(POOL_DOC, d);
}

function flash(msg, color) {
  if (!color) color = "#16a34a";
  document.getElementById("flash-area").innerHTML = '<div class="flash" style="background:' + color + '">' + msg + '</div>';
  setTimeout(function() { document.getElementById("flash-area").innerHTML = ""; }, 3000);
}

function currentWeek() {
  if (!appState.data || !appState.data.seasonStart) return 1;
  var start = new Date(appState.data.seasonStart);
  var now = new Date();
  var diff = Math.floor((now - start) / (7*24*3600*1000));
  return Math.max(1, Math.min(diff+1, appState.data.weekCount||26));
}

function getDraftPosition(playerIndex, weekNum) {
  var w = (weekNum - 1) % 8;
  return (ROTATION[w] + playerIndex) % 8;
}

function orderedPlayers(weekNum) {
  var players = appState.data.players || [];
  var hasOverride = false;
  for (var i = 0; i < players.length; i++) {
    if (players[i].draftOrder && players[i].draftOrder[weekNum] !== undefined) { hasOverride = true; break; }
  }
  var sorted = players.slice();
  if (hasOverride) {
    sorted.sort(function(a,b) {
      var as = (a.draftOrder && a.draftOrder[weekNum] !== undefined) ? a.draftOrder[weekNum] : 99;
      var bs = (b.draftOrder && b.draftOrder[weekNum] !== undefined) ? b.draftOrder[weekNum] : 99;
      return as - bs;
    });
  } else {
    sorted.sort(function(a,b) {
      return getDraftPosition(players.indexOf(a), weekNum) - getDraftPosition(players.indexOf(b), weekNum);
    });
  }
  return sorted;
}

function usedTeams(playerName) {
  var used = [];
  var weeks = appState.data.weeks || {};
  for (var w in weeks) {
    if (weeks[w].picks && weeks[w].picks[playerName]) used.push(weeks[w].picks[playerName]);
  }
  return used;
}

function takenTeamsThisWeek(weekNum) {
  var taken = [];
  var picks = (appState.data.weeks && appState.data.weeks[weekNum] && appState.data.weeks[weekNum].picks) || {};
  for (var p in picks) taken.push(picks[p]);
  return taken;
}

function isMyTurn(weekNum, playerName) {
  var picks = (appState.data.weeks && appState.data.weeks[weekNum] && appState.data.weeks[weekNum].picks) || {};
  var ordered = orderedPlayers(weekNum);
  for (var i = 0; i < ordered.length; i++) {
    if (!picks[ordered[i].name]) return ordered[i].name === playerName;
  }
  return false;
}

// SCHEDULE / TIMING
function getWeekWindow(weekNum) {
  if (!appState.data.seasonStart) return null;
  var start = new Date(appState.data.seasonStart);
  var weekMonday = new Date(start);
  weekMonday.setDate(start.getDate() + (weekNum - 1) * 7);
  var friday = new Date(weekMonday);
  friday.setDate(weekMonday.getDate() - 3);
  // Draft opens Friday midnight ET, slots start Sunday 2pm ET, closes Sunday 10pm ET
  var sunday = new Date(weekMonday);
  sunday.setDate(weekMonday.getDate() - 1);
  var openET    = new Date(friday.toISOString().split("T")[0] + "T00:00:00-05:00");
  var mondayBase = new Date(sunday.toISOString().split("T")[0] + "T14:00:00-05:00");
  var closeET   = new Date(sunday.toISOString().split("T")[0] + "T22:00:00-05:00");
  return { openET: openET, mondayBase: mondayBase, closeET: closeET };
}

function getPickDeadline(weekNum, slotIndex) {
  var win = getWeekWindow(weekNum);
  if (!win) return null;
  var d = new Date(win.mondayBase);
  d.setHours(d.getHours() + slotIndex + 1);
  return d;
}

function isDraftOpen(weekNum) {
  var win = getWeekWindow(weekNum);
  if (!win) return false;
  var now = new Date();
  return now >= win.openET && now < win.closeET;
}

function isWeekLocked(weekNum) {
  var win = getWeekWindow(weekNum);
  if (!win) return false;
  return new Date() >= win.closeET;
}

function canPlayerPick(weekNum, playerName) {
  var now = new Date();
  var win = getWeekWindow(weekNum);
  if (!win) return { can: false, reason: "Season not configured." };
  if (now < win.openET) return { can: false, reason: "Draft opens " + formatET(win.openET) + " ET." };
  if (now >= win.closeET) return { can: false, reason: "The 10:00pm ET Sunday deadline has passed." };
  var picks = (appState.data.weeks && appState.data.weeks[weekNum] && appState.data.weeks[weekNum].picks) || {};
  if (picks[playerName]) return { can: false, reason: "You have already picked this week." };
  var ordered = orderedPlayers(weekNum);
  var slotIndex = -1;
  for (var i = 0; i < ordered.length; i++) {
    if (ordered[i].name === playerName) { slotIndex = i; break; }
  }
  if (slotIndex < 0) return { can: false, reason: "Player not found." };
  var myDeadline = getPickDeadline(weekNum, slotIndex);
  if (now >= myDeadline) return { can: false, reason: "Your pick window has closed. A default pick has been assigned." };
  var mondayStarted = now >= win.mondayBase;
  if (mondayStarted) {
    for (var j = 0; j < slotIndex; j++) {
      var prevDeadline = getPickDeadline(weekNum, j);
      var prevPicked = !!picks[ordered[j].name];
      if (!prevPicked && now < prevDeadline) {
        return { can: false, reason: "Waiting for " + ordered[j].name + " to pick (deadline: " + formatET(prevDeadline) + " ET)." };
      }
    }
  }
  return { can: true, reason: "", deadline: myDeadline, slotIndex: slotIndex };
}

async function processAutoPicks(weekNum) {
  var ordered = orderedPlayers(weekNum);
  var picks = (appState.data.weeks && appState.data.weeks[weekNum] && appState.data.weeks[weekNum].picks)
    ? JSON.parse(JSON.stringify(appState.data.weeks[weekNum].picks)) : {};
  var now = new Date();
  var changed = false;
  var gameCounts = await fetchScheduleFromAPI(weekNum);
  for (var i = 0; i < ordered.length; i++) {
    var p = ordered[i];
    if (picks[p.name]) continue;
    var deadline = getPickDeadline(weekNum, i);
    if (now < deadline) continue;
    var taken = [];
    for (var pl in picks) taken.push(picks[pl]);
    var used = usedTeams(p.name);
    var defaultTeam = null;
    for (var t = 0; t < MLB_TEAMS.length; t++) {
      var team = MLB_TEAMS[t];
      if (taken.indexOf(team) >= 0) continue;
      if (used.indexOf(team) >= 0) continue;
      var games = gameCounts[team] !== undefined ? parseFloat(gameCounts[team]) : 0;
      if (games >= 6) { defaultTeam = team; break; }
    }
    if (!defaultTeam) {
      for (var t2 = 0; t2 < MLB_TEAMS.length; t2++) {
        var team2 = MLB_TEAMS[t2];
        if (taken.indexOf(team2) >= 0) continue;
        if (used.indexOf(team2) >= 0) continue;
        defaultTeam = team2; break;
      }
    }
    if (defaultTeam) { picks[p.name] = defaultTeam; changed = true; }
  }
  if (changed) {
    var d = JSON.parse(JSON.stringify(appState.data));
    d.weeks = d.weeks || {}; d.weeks[weekNum] = d.weeks[weekNum] || {};
    d.weeks[weekNum].picks = picks;
    await saveData(d);
  }
}

function formatET(date) {
  return date.toLocaleString("en-US", { timeZone:"America/New_York", weekday:"short", month:"short", day:"numeric", hour:"numeric", minute:"2-digit", hour12:true });
}

// PAYOUT CALCULATION
function calcWeekStandings(weekNum, overrideRuns) {
  var picks = (appState.data.weeks && appState.data.weeks[weekNum] && appState.data.weeks[weekNum].picks) || {};
  var savedRuns = (appState.data.weeks && appState.data.weeks[weekNum] && appState.data.weeks[weekNum].runs) || {};
  var runs = overrideRuns || savedRuns;
  var players = appState.data.players || [];
  var rows = [];
  for (var i = 0; i < players.length; i++) {
    var p = players[i];
    var team = picks[p.name] || null;
    var playerRuns = null;
    if (team !== null) {
      playerRuns = (runs[team] !== undefined && runs[team] !== null) ? runs[team] : 0;
    }
    rows.push({ name: p.name, team: team, runs: playerRuns, payout: null });
  }
  rows.sort(function(a, b) {
    var ar = (a.runs !== null) ? a.runs : -9999;
    var br = (b.runs !== null) ? b.runs : -9999;
    return br - ar;
  });
  var playersWithPicks = [];
  for (var j = 0; j < rows.length; j++) {
    if (rows[j].runs !== null) playersWithPicks.push(rows[j]);
  }
  if (playersWithPicks.length > 0) {
    var winner = playersWithPicks[0];
    var winnerPayout = 0;
    for (var k = 1; k < playersWithPicks.length; k++) {
      var diff = winner.runs - playersWithPicks[k].runs;
      winnerPayout += diff * 2;
      playersWithPicks[k].payout = -(diff * 2);
    }
    winner.payout = winnerPayout;
  }
  return rows;
}

function calcSeasonStandings() {
  var totals = {};
  var players = appState.data.players || [];
  for (var i = 0; i < players.length; i++) {
    totals[players[i].name] = { name: players[i].name, totalRuns: 0, totalWinnings: 0, weeks: 0 };
  }
  for (var w = 1; w <= (appState.data.weekCount || 26); w++) {
    var ws = calcWeekStandings(w);
    var hasData = false;
    for (var j = 0; j < ws.length; j++) { if (ws[j].runs !== null) { hasData = true; break; } }
    if (!hasData) continue;
    for (var k = 0; k < ws.length; k++) {
      var r = ws[k];
      if (!totals[r.name]) continue;
      if (r.runs !== null) { totals[r.name].totalRuns += r.runs; totals[r.name].weeks++; }
      if (r.payout !== null) totals[r.name].totalWinnings += r.payout;
    }
  }
  var result = [];
  for (var name in totals) result.push(totals[name]);
  result.sort(function(a,b) { return b.totalWinnings - a.totalWinnings || b.totalRuns - a.totalRuns; });
  return result;
}

// NAV
function renderNav() {
  var user = appState.user, view = appState.view;
  function nb(v, label) {
    return '<button class="nav-btn' + (view===v?' active':'') + '" onclick="setView(\'' + v + '\');document.getElementById(\'nav-links\').classList.remove(\'open\')">' + label + '</button>';
  }
  var navItems =
    nb("home","Home") + nb("draft","Draft Board") + nb("standings","Standings") + nb("research","Research") +
    (user && user.isAdmin ? nb("admin","Admin") : "") +
    (user && !user.isAdmin ? nb("player","My Picks") : "") +
    (user ? '<button class="logout-btn" onclick="doLogout()">Logout (' + user.name + ')</button>' : "");

  document.getElementById("nav").innerHTML =
    // Desktop nav
    '<div class="nav-desktop"><span class="nav-title" style="margin-right:6px">Baseball Run Pool</span>' + navItems + '</div>' +
    // Mobile nav
    '<div class="nav-top">' +
    '<span class="nav-title">Baseball Run Pool</span>' +
    (user ? '<span style="color:#94a3b8;font-size:12px;margin-right:4px">' + user.name + '</span>' : '') +
    '<button class="nav-hamburger" onclick="document.getElementById(\'nav-links\').classList.toggle(\'open\')">&#9776;</button></div>' +
    '<div class="nav-links" id="nav-links">' + navItems + '</div>';
}

window.setView = function(v) { appState.view = v; render(); };
window.doLogout = function() { appState.user = null; appState.view = "home"; render(); };

function render() {
  renderNav();
  var app = document.getElementById("app");
  if (!appState.data) { app.innerHTML = '<div style="padding:60px;text-align:center;color:#94a3b8"><span class="spinner"></span> Loading...</div>'; return; }
  if (appState.view === "home")      app.innerHTML = renderHome();
  if (appState.view === "admin")     app.innerHTML = renderAdmin();
  if (appState.view === "player")    app.innerHTML = renderPlayer();
  if (appState.view === "standings") { app.innerHTML = renderStandingsShell(); loadStandingsWeek(currentWeek()); }
  if (appState.view === "research")  { app.innerHTML = renderResearchShell(); loadResearchTable(currentWeek()); }
  if (appState.view === "draft")     { app.innerHTML = renderDraftShell(); loadDraftTable(currentWeek()); }
}

// HOME
function renderHome() {
  var w = currentWeek();
  var info = appState.data.seasonStart
    ? '<p style="color:#94a3b8;margin-top:6px">Season started: ' + appState.data.seasonStart + ' | Current Week: <strong style="color:#38bdf8">' + w + '</strong></p>'
    : '<p style="color:#f59e0b;margin-top:6px">Season not configured. Admin must set up the pool first.</p>';
  var opts = "";
  var players = appState.data.players || [];
  for (var i = 0; i < players.length; i++) opts += '<option value="' + players[i].name + '">' + players[i].name + '</option>';
  return '<div style="text-align:center;margin-bottom:28px;padding-top:20px">' +
    '<div style="font-size:32px;font-weight:800;color:#38bdf8">Baseball Run Pool</div>' + info + '</div>' +
    '<div style="max-width:400px;margin:0 auto" class="card">' +
    '<div style="display:flex;gap:8px;margin-bottom:20px">' +
    '<button class="tab-btn active" id="tab-player" onclick="homeTab(\'player\')" style="flex:1">Player Login</button>' +
    '<button class="tab-btn" id="tab-admin" onclick="homeTab(\'admin\')" style="flex:1">Admin Login</button></div>' +
    '<div id="home-player-panel">' +
    (!opts ? '<p style="color:#94a3b8;text-align:center">No players set up yet.</p>' :
      '<select id="player-select" style="margin-bottom:12px"><option value="">Select your name...</option>' + opts + '</select>' +
      '<button style="width:100%;padding:11px;background:#2563eb;color:#fff;font-size:16px" onclick="loginPlayer()">Enter Pool</button>') + '</div>' +
    '<div id="home-admin-panel" style="display:none">' +
    '<input type="password" id="admin-pw" placeholder="Commissioner password" style="margin-bottom:8px" onkeydown="if(event.key===\'Enter\')loginAdmin()"/>' +
    '<div id="pw-error" style="color:#ef4444;font-size:13px;margin-bottom:8px"></div>' +
    '<button style="width:100%;padding:11px;background:#7c3aed;color:#fff;font-size:16px" onclick="loginAdmin()">Login as Admin</button></div></div>';
}
window.homeTab = function(t) {
  document.getElementById("home-player-panel").style.display = t==="player"?"block":"none";
  document.getElementById("home-admin-panel").style.display  = t==="admin"?"block":"none";
  document.getElementById("tab-player").classList.toggle("active",t==="player");
  document.getElementById("tab-admin").classList.toggle("active",t==="admin");
};
window.loginPlayer = function() {
  var el = document.getElementById("player-select"); if (!el || !el.value) return;
  appState.user = { name: el.value, isAdmin: false }; appState.view = "player"; render();
};
window.loginAdmin = function() {
  var el = document.getElementById("admin-pw");
  if (el && el.value === ADMIN_PW) { appState.user = { name:"Commissioner", isAdmin:true }; appState.view="admin"; render(); }
  else document.getElementById("pw-error").textContent = "Incorrect password.";
};

// ADMIN
function renderAdmin() {
  var tabLabels = { setup:"Season Setup", players:"Players & Draft Order", runs:"Enter Runs", manage:"Week Management", picks:"Enter Pick", reset:"Reset Pool" };
  var tabKeys = ["setup","players","runs","manage","picks","reset"];
  var btns = "";
  for (var i = 0; i < tabKeys.length; i++) {
    btns += '<button class="tab-btn' + (i===0?' active':'') + '" id="atab-' + tabKeys[i] + '" onclick="adminTab(\'' + tabKeys[i] + '\')">' + tabLabels[tabKeys[i]] + '</button>';
  }
  return '<h2 style="font-weight:800;font-size:22px;color:#38bdf8;margin-bottom:16px">Commissioner Panel</h2>' +
    '<div class="admin-tabs" style="margin-bottom:20px">' + btns + '</div>' +
    '<div id="admin-panel">' + renderAdminSetup() + '</div>';
}
window.adminTab = function(t) {
  var keys = ["setup","players","runs","manage","picks","reset"];
  for (var i = 0; i < keys.length; i++) {
    var el = document.getElementById("atab-" + keys[i]);
    if (el) el.classList.toggle("active", keys[i]===t);
  }
  var panel = document.getElementById("admin-panel");
  if (t==="setup")   panel.innerHTML = renderAdminSetup();
  if (t==="players") panel.innerHTML = renderAdminPlayers();
  if (t==="runs")    panel.innerHTML = renderAdminRuns(currentWeek());
  if (t==="manage")  panel.innerHTML = renderAdminManage(currentWeek());
  if (t==="picks")   panel.innerHTML = renderAdminPicks(currentWeek());
  if (t==="reset")   panel.innerHTML = renderAdminReset();
};

function renderAdminSetup() {
  return '<div class="card" style="max-width:400px">' +

window.savePlayers = async function() {
  var existing = (appState.data.players && appState.data.players.length) ? appState.data.players : [];
  while (existing.length < 8) existing.push({ name:"", draftOrder:{} });
  var updated = [];
  for (var i = 0; i < existing.length; i++) {
    var el = document.getElementById("pname-" + i);
    var name = el ? el.value.trim() : "";
    if (name) updated.push({ name: name, draftOrder: existing[i].draftOrder || {} });
  }
  if (updated.length < 2) { flash("Need at least 2 players.", "#dc2626"); return; }
  var d = JSON.parse(JSON.stringify(appState.data)); d.players = updated;
  await saveData(d); flash("Players saved!");
};
window.loadOrderEditor = function() { renderOrderEditor(Number(document.getElementById("order-week").value)); };
function renderOrderEditor(weekNum) {
  var players = appState.data.players || [];
  if (!players.length) { document.getElementById("order-editor").innerHTML = '<p style="color:#94a3b8">Save players first.</p>'; return; }
  orderState = players.slice().sort(function(a,b) {
    var as = (a.draftOrder && a.draftOrder[weekNum] !== undefined) ? a.draftOrder[weekNum] : 99;
    var bs = (b.draftOrder && b.draftOrder[weekNum] !== undefined) ? b.draftOrder[weekNum] : 99;
    return as - bs;
  });
  var rows = "";
  for (var i = 0; i < orderState.length; i++) {
    rows += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;background:#0f172a;border-radius:8px;padding:8px 12px">' +
      '<span style="color:#38bdf8;width:24px;font-weight:800">#' + (i+1) + '</span>' +
      '<span style="flex:1;font-weight:600">' + orderState[i].name + '</span>' +
      '<button style="padding:2px 9px;background:#334155;color:#f1f5f9;border-radius:4px" onclick="orderMove(' + weekNum + ',' + i + ',-1)">Up</button>' +
      '<button style="padding:2px 9px;background:#334155;color:#f1f5f9;border-radius:4px" onclick="orderMove(' + weekNum + ',' + i + ',1)">Dn</button></div>';
  }
  document.getElementById("order-editor").innerHTML =
    '<div style="color:#38bdf8;font-weight:700;margin-bottom:10px">Week ' + weekNum + ' Pick Order</div>' + rows +
    '<button style="margin-top:8px;padding:8px 18px;background:#16a34a;color:#fff" onclick="saveOrder(' + weekNum + ')">Save Order</button>';
}
window.orderMove = function(weekNum, idx, dir) {
  var ni = idx + dir;
  if (ni < 0 || ni >= orderState.length) return;
  var tmp = orderState[idx]; orderState[idx] = orderState[ni]; orderState[ni] = tmp;
  for (var i = 0; i < orderState.length; i++) { orderState[i].draftOrder = orderState[i].draftOrder || {}; orderState[i].draftOrder[weekNum] = i; }
  renderOrderEditor(weekNum);
};
window.saveOrder = async function(weekNum) {
  var d = JSON.parse(JSON.stringify(appState.data));
  for (var i = 0; i < d.players.length; i++) {
    for (var j = 0; j < orderState.length; j++) {
      if (orderState[j].name === d.players[i].name) {
        d.players[i].draftOrder = d.players[i].draftOrder || {};
        d.players[i].draftOrder[weekNum] = orderState[j].draftOrder[weekNum];
        break;
      }
    }
  }
  await saveData(d); flash("Week " + weekNum + " order saved!");
};

window.fetchLiveRunsAdmin = async function() {
  var w = Number(document.getElementById("runs-week").value);
  var picks = (appState.data.weeks && appState.data.weeks[w] && appState.data.weeks[w].picks) || {};
  var teams = Object.values(picks);

  var found = 0;

    var el = document.getElementById("run-" + teams[i].replace(/ /g,'_'));
    if (el && totals[teams[i]] !== undefined) { el.value = totals[teams[i]]; found++; }
  }
  flash(found ? "Fetched runs for " + found + "/" + teams.length + " teams!" : "No final game data found yet.", "#0891b2");
  btn.innerHTML = "Fetch Live"; btn.disabled = false;

async function fetchRunsFromAPI(w) {
  if (!appState.data.seasonStart) return {};
  try {
    var start = new Date(appState.data.seasonStart);
    var ws = new Date(start); ws.setDate(start.getDate() + (w-1)*7);
    var we = new Date(ws); we.setDate(ws.getDate() + 6);
    function fmt(d) { return d.toISOString().split("T")[0]; }
    var url = "https://statsapi.mlb.com/api/v1/schedule?sportId=1&startDate=" + fmt(ws) + "&endDate=" + fmt(we) + "&gameType=R&fields=dates,games,teams,away,home,team,name,score,status,abstractGameState,detailedState";
    var res = await fetch(url); var json = await res.json();
    var totals = {};
    var dates = json.dates || [];
    for (var i = 0; i < dates.length; i++) {
      var games = dates[i].games || [];
      for (var j = 0; j < games.length; j++) {
        var g = games[j];
        var detail = (g.status && g.status.detailedState) ? g.status.detailedState.toLowerCase() : "";
        var isFinal = g.status && g.status.abstractGameState === "Final";
        var isSusp = detail.indexOf("suspended") >= 0 || detail.indexOf("resume") >= 0;
        if (!isFinal && !isSusp) continue;
        var aw = g.teams && g.teams.away; var hm = g.teams && g.teams.home;
        if (aw && aw.team && aw.team.name) totals[aw.team.name] = (totals[aw.team.name]||0) + (aw.score||0);
        if (hm && hm.team && hm.team.name) totals[hm.team.name] = (totals[hm.team.name]||0) + (hm.score||0);
      }
    }
    return totals;
  } catch(e) { return {}; }
}

async function fetchScheduleFromAPI(w) {
  if (scheduleCache[w]) return scheduleCache[w];
  if (!appState.data.seasonStart) return {};
  try {
    var start = new Date(appState.data.seasonStart);
    var ws = new Date(start); ws.setDate(start.getDate() + (w-1)*7);
    var we = new Date(ws); we.setDate(ws.getDate() + 6);
    function fmt(d) { return d.toISOString().split("T")[0]; }
    var url = "https://statsapi.mlb.com/api/v1/schedule?sportId=1&startDate=" + fmt(ws) + "&endDate=" + fmt(we) + "&gameType=R&fields=dates,games,teams,away,home,team,name,status,abstractGameState,detailedState";
    var res = await fetch(url); var json = await res.json();
    var counts = {};
    var dates = json.dates || [];
    for (var i = 0; i < dates.length; i++) {
      var games = dates[i].games || [];
      for (var j = 0; j < games.length; j++) {
        var g = games[j];
        var detail = (g.status && g.status.detailedState) ? g.status.detailedState.toLowerCase() : "";
        var isSusp = detail.indexOf("suspended") >= 0 || detail.indexOf("resume") >= 0;
        var val = isSusp ? 0.5 : 1;
        var aw = g.teams && g.teams.away && g.teams.away.team && g.teams.away.team.name;
        var hm = g.teams && g.teams.home && g.teams.home.team && g.teams.home.team.name;
        if (aw) counts[aw] = (counts[aw]||0) + val;
        if (hm) counts[hm] = (counts[hm]||0) + val;
      }
    }
    var formatted = {};
    for (var team in counts) formatted[team] = (counts[team] % 1 === 0) ? counts[team] : counts[team].toFixed(1);
    scheduleCache[w] = formatted;
    return formatted;
  } catch(e) { return {}; }
}

function renderAdminPicks(w) {
  var players = appState.data.players || [];
  var picks = (appState.data.weeks && appState.data.weeks[w] && appState.data.weeks[w].picks) || {};
  var takenList = [];
  for (var p in picks) takenList.push(picks[p]);
  var rows = "";
  for (var i = 0; i < players.length; i++) {
    var pl = players[i];
    var current = picks[pl.name] || "";
    var used = usedTeams(pl.name);
    var opts = '<option value="">No pick</option>';
    for (var j = 0; j < MLB_TEAMS.length; j++) {
      var t = MLB_TEAMS[j];
      var isTaken = takenList.indexOf(t) >= 0 && t !== current;
      var isUsed = used.indexOf(t) >= 0 && t !== current;
      var dis = isTaken || isUsed;
      opts += '<option value="' + t + '"' + (current===t?" selected":"") + (dis?" disabled":"") + '>' + t + (isTaken?" (taken)":isUsed?" (used)":"") + '</option>';
    }
    rows += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;background:#0f172a;border-radius:8px;padding:10px 14px;flex-wrap:wrap">' +
      '<div style="min-width:120px;font-weight:600">' + pl.name + '</div>' +
      '<select id="apick-' + pl.name.replace(/ /g,'_') + '" style="flex:1;min-width:180px">' + opts + '</select></div>';
  }
  return '<div class="card" style="max-width:580px">' +
    '<h3 style="font-weight:700;margin-bottom:14px">Enter Pick for Player</h3>' +
    '<div style="display:flex;gap:8px;align-items:center;margin-bottom:18px">' +
    '<label style="color:#94a3b8;font-size:13px">Week:</label>' +
    '<input type="number" id="apick-week" value="' + w + '" min="1" max="' + (appState.data.weekCount||26) + '" style="width:60px"/>' +
    '<button style="padding:7px 14px;background:#7c3aed;color:#fff;font-size:13px" onclick="loadAdminPicks()">Load</button></div>' +
    '<div id="apick-rows">' + rows + '</div>' +

    '<button style="padding:10px 24px;background:#2563eb;color:#fff" onclick="saveAdminPicks(' + w + ')">Save Picks</button>' +
    '<button style="padding:10px 24px;background:#b45309;color:#fff" onclick="clearAdminPick(' + w + ')">Clear All Picks</button></div></div>';
}

window.saveAdminPicks = async function(w) {
  var players = appState.data.players || [];
  var picks = (appState.data.weeks && appState.data.weeks[w] && appState.data.weeks[w].picks) ? JSON.parse(JSON.stringify(appState.data.weeks[w].picks)) : {};
  var teamCount = {};
  for (var i = 0; i < players.length; i++) {
    var el = document.getElementById("apick-" + players[i].name.replace(/ /g,'_'));
    if (el && el.value) teamCount[el.value] = (teamCount[el.value]||0)+1;
  }
  var dupes = [];
  for (var t in teamCount) { if (teamCount[t]>1) dupes.push(t); }
  if (dupes.length) { flash("Conflict: " + dupes.join(", ") + " selected by more than one player.", "#dc2626"); return; }
  for (var j = 0; j < players.length; j++) {
    var el2 = document.getElementById("apick-" + players[j].name.replace(/ /g,'_'));
    if (!el2) continue;
    if (el2.value) picks[players[j].name] = el2.value;
    else delete picks[players[j].name];
  }
  var d = JSON.parse(JSON.stringify(appState.data));
  d.weeks = d.weeks||{}; d.weeks[w] = d.weeks[w]||{}; d.weeks[w].picks = picks;
  await saveData(d); flash("Picks saved for Week " + w + "!");
  document.getElementById("admin-panel").innerHTML = renderAdminPicks(w);
};

window.doResetPool = async function(fullReset) {
  var answer = prompt(fullReset ? "FULL RESET: Wipes ALL data. Type RESET to confirm:" : "SOFT RESET: Clears picks/runs/dates, keeps names. Type RESET to confirm:");
  if (answer !== "RESET") { flash("Reset cancelled.", "#b45309"); return; }
  var newData = defaultData();
  if (!fullReset) {
    var players = appState.data.players || [];
    for (var i = 0; i < players.length; i++) newData.players.push({ name: players[i].name, draftOrder: {} });
  }
  scheduleCache = {}; liveRunsCache = {};
  await saveData(newData);
  flash(fullReset ? "Pool fully reset!" : "Season data cleared - player names kept!", "#b45309");
  document.getElementById("admin-panel").innerHTML = renderAdminReset();
};

// PLAYER VIEW
function renderPlayer() {
  var name = appState.user.name;
  var w = currentWeek();
  var picks = (appState.data.weeks && appState.data.weeks[w] && appState.data.weeks[w].picks) || {};
  var runs  = (appState.data.weeks && appState.data.weeks[w] && appState.data.weeks[w].runs)  || {};
  var myPick = picks[name] || null;
  var myRuns = (myPick && runs[myPick] !== undefined) ? runs[myPick] : null;
  var used = usedTeams(name);
  var taken = takenTeamsThisWeek(w);
  var players = appState.data.players || [];
  var playerIndex = -1;
  for (var i = 0; i < players.length; i++) { if (players[i].name === name) { playerIndex = i; break; } }
  var pos = playerIndex >= 0 ? getDraftPosition(playerIndex, w) + 1 : null;
  var win = getWeekWindow(w);
  var pickCheck = canPlayerPick(w, name);
  var weekLocked = isWeekLocked(w);
  var draftOpen = isDraftOpen(w);

  if (draftOpen || weekLocked) processAutoPicks(w);

  var statusBox;
  if (myPick) {
    statusBox = '<div style="margin-top:10px;padding:12px 16px;background:#16a34a22;border-radius:8px;border:1px solid #16a34a">Picked: <strong>' + myPick + '</strong>' + (myRuns!==null?' <span style="color:#fbbf24">' + myRuns + ' runs</span>':'') + '</div>';
  } else if (weekLocked) {
    statusBox = '<div style="margin-top:10px;padding:10px 16px;background:#ef444422;border:1px solid #ef4444;border-radius:8px;color:#ef4444;font-weight:600">Week is locked - 10:00pm ET Sunday deadline has passed.</div>';
  } else if (!draftOpen && win) {

async function loadResearchTable(w) {
  var el = document.getElementById("research-table");
  if (!el) return;
  el.innerHTML = '<div style="color:#94a3b8;padding:16px"><span class="spinner"></span> Loading schedule...</div>';

  if (!appState.data.seasonStart) {
    el.innerHTML = '<p style="color:#f59e0b;padding:16px">Set a season start date in Admin first.</p>';
    return;
  }

  var filterEl = document.getElementById("research-filter");
  var sortEl = document.getElementById("research-sort");
  var filterMode = filterEl ? filterEl.value : "picked";
  var sortMode = sortEl ? sortEl.value : "name";

  // Get this player's picked teams across ALL weeks (not just current week)
  var myPickedTeams = [];
  if (appState.user && !appState.user.isAdmin) {
    var name = appState.user.name;
    var weeks = appState.data.weeks || {};
    for (var wk in weeks) {
      if (weeks[wk].picks && weeks[wk].picks[name]) {
        myPickedTeams.push(weeks[wk].picks[name]);
      }
    }
  }

  try {
    var start = new Date(appState.data.seasonStart);
    var weekMonday = new Date(start);
    weekMonday.setDate(start.getDate() + (w - 1) * 7);

    var days = [];
    for (var d = 0; d < 7; d++) {
      var day = new Date(weekMonday);
      day.setDate(weekMonday.getDate() + d);
      days.push(day);
    }
    var dayLabels = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

    function fmt(dt) { return dt.toISOString().split("T")[0]; }
    var url = "https://statsapi.mlb.com/api/v1/schedule?sportId=1&startDate=" + fmt(days[0]) + "&endDate=" + fmt(days[6]) + "&gameType=R&fields=dates,date,games,teams,away,home,team,name,status,abstractGameState";
    var res = await fetch(url);
    var json = await res.json();

    var teamSchedule = {};
    for (var t = 0; t < MLB_TEAMS.length; t++) {
      teamSchedule[MLB_TEAMS[t]] = { 0:[], 1:[], 2:[], 3:[], 4:[], 5:[], 6:[] };
    }

    var dates = json.dates || [];
    for (var i = 0; i < dates.length; i++) {
      var dateStr = dates[i].date;
      var dayIdx = -1;
      for (var di = 0; di < days.length; di++) {
        if (fmt(days[di]) === dateStr) { dayIdx = di; break; }
      }
      if (dayIdx < 0) continue;
      var games = dates[i].games || [];
      for (var j = 0; j < games.length; j++) {
        var g = games[j];
        var awayName = g.teams && g.teams.away && g.teams.away.team && g.teams.away.team.name;
        var homeName = g.teams && g.teams.home && g.teams.home.team && g.teams.home.team.name;
        if (!awayName || !homeName) continue;
        if (teamSchedule[awayName]) teamSchedule[awayName][dayIdx].push({ opp: homeName, isHome: false });
        if (teamSchedule[homeName]) teamSchedule[homeName][dayIdx].push({ opp: awayName, isHome: true });
      }
    }

    function totalGames(schedule) {
      var total = 0;
      for (var d2 = 0; d2 < 7; d2++) total += schedule[d2].length;
      return total;
    }

    var abbrevMap = {
      "Arizona Diamondbacks":"ARI","Atlanta Braves":"ATL","Baltimore Orioles":"BAL",
      "Boston Red Sox":"BOS","Chicago Cubs":"CHC","Chicago White Sox":"CWS",
      "Cincinnati Reds":"CIN","Cleveland Guardians":"CLE","Colorado Rockies":"COL",
      "Detroit Tigers":"DET","Houston Astros":"HOU","Kansas City Royals":"KC",
      "Los Angeles Angels":"LAA","Los Angeles Dodgers":"LAD","Miami Marlins":"MIA",
      "Milwaukee Brewers":"MIL","Minnesota Twins":"MIN","New York Mets":"NYM",
      "New York Yankees":"NYY","Oakland Athletics":"OAK","Philadelphia Phillies":"PHI",
      "Pittsburgh Pirates":"PIT","San Diego Padres":"SD","San Francisco Giants":"SF",
      "Seattle Mariners":"SEA","St. Louis Cardinals":"STL","Tampa Bay Rays":"TB",
      "Texas Rangers":"TEX","Toronto Blue Jays":"TOR","Washington Nationals":"WSH"
    };
    function abbrev(name) { return abbrevMap[name] || name.substring(0,3).toUpperCase(); }

    function cellContent(games) {
      if (games.length === 0) return '<span style="color:#334155">--</span>';
      if (games.length === 1) {
        return '<span style="color:#f1f5f9">' + (games[0].isHome?"":"@") + abbrev(games[0].opp) + '</span>';
      }
      var parts = [];
      for (var k = 0; k < games.length; k++) parts.push((games[k].isHome?"":"@") + abbrev(games[k].opp));
      return '<span style="color:#fbbf24;font-weight:700">DH</span><br><span style="font-size:10px;color:#94a3b8">' + parts.join("/") + '</span>';
    }

    // Determine which teams to show
    var teamsToShow = MLB_TEAMS.slice();
    if (filterMode === "picked" && myPickedTeams.length > 0) {
      teamsToShow = myPickedTeams.slice();
    } else if (filterMode === "picked" && myPickedTeams.length === 0) {
      el.innerHTML = '<div style="color:#94a3b8;padding:16px">You have no picked teams yet. Switch to "All 30 teams" to browse the schedule.</div>';
      return;
    }

    // Sort
    if (sortMode === "name") {
      teamsToShow.sort();
    } else {
      teamsToShow.sort(function(a,b) {
        return totalGames(teamSchedule[b]) - totalGames(teamSchedule[a]);
      });
    }

    // Current week picks to highlight
    var weekPicks = (appState.data.weeks && appState.data.weeks[w] && appState.data.weeks[w].picks) || {};
    var weekPickedTeams = [];
    for (var pl in weekPicks) weekPickedTeams.push(weekPicks[pl]);

    var dateHeader = '<tr><th>Team</th><th style="text-align:center">Total</th>';
    for (var dh = 0; dh < 7; dh++) {
      dateHeader += '<th style="text-align:center">' + dayLabels[dh] + '<br><span style="font-weight:400;color:#64748b">' + (days[dh].getMonth()+1) + '/' + days[dh].getDate() + '</span></th>';
    }
    dateHeader += '</tr>';

    var teamRows = "";
    for (var ti = 0; ti < teamsToShow.length; ti++) {
      var team = teamsToShow[ti];
      var sched = teamSchedule[team];
      if (!sched) continue;
      var total = totalGames(sched);
      var isPickedThisWeek = weekPickedTeams.indexOf(team) >= 0;
      var isMyPickThisWeek = appState.user && !appState.user.isAdmin && weekPicks[appState.user.name] === team;
      var rowStyle = isMyPickThisWeek ? 'background:#16a34a22;' : isPickedThisWeek ? 'background:#2563eb22;' : '';
      var totalColor = total >= 7 ? '#16a34a' : total >= 5 ? '#fbbf24' : '#ef4444';
      var badge = isMyPickThisWeek ? ' <span style="font-size:10px;background:#16a34a;padding:1px 5px;border-radius:4px;color:#fff">my pick</span>' :
                  isPickedThisWeek ? ' <span style="font-size:10px;background:#2563eb;padding:1px 5px;border-radius:4px;color:#fff">picked</span>' : '';
      teamRows += '<tr style="' + rowStyle + '">' +
        '<td style="font-weight:600;white-space:nowrap">' + team + badge + '</td>' +
        '<td style="text-align:center;font-weight:800;color:' + totalColor + '">' + total + '</td>';
      for (var dc = 0; dc < 7; dc++) {
        teamRows += '<td style="text-align:center;font-size:12px;line-height:1.4">' + cellContent(sched[dc]) + '</td>';
      }
      teamRows += '</tr>';
    }

    var weekDates = fmt(days[0]) + ' to ' + fmt(days[6]);
    el.innerHTML =
      '<div style="color:#94a3b8;font-size:12px;margin-bottom:10px">Week ' + w + ': ' + weekDates + '</div>' +
      '<div style="font-size:12px;margin-bottom:10px;display:flex;gap:16px;flex-wrap:wrap">' +
      '<span style="color:#16a34a;font-weight:700">7+ games</span>' +
      '<span style="color:#fbbf24;font-weight:700">5-6 games</span>' +
      '<span style="color:#ef4444;font-weight:700">Under 5</span>' +
      '<span style="color:#fbbf24;font-weight:700">DH = Doubleheader</span>' +
      '<span style="color:#94a3b8">@ = Away</span></div>' +
      '<div class="table-wrap"><table>' +
      '<thead>' + dateHeader + '</thead>' +
      '<tbody>' + teamRows + '</tbody></table></div>';

  } catch(e) {
    el.innerHTML = '<p style="color:#ef4444;padding:16px">Failed to load schedule. Please try again.</p>';
  }
}
window.refreshResearch = function() {
  var w = Number(document.getElementById("research-week").value);
  delete scheduleCache[w];
  loadResearchTable(w);
};
window.loadResearchTable = loadResearchTable;

// BOOT
onSnapshot(POOL_DOC, function(snap) {
  appState.data = snap.exists() ? snap.data() : defaultData();
  render();
});
</script>
</body>
