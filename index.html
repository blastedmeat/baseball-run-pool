<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Baseball Run Pool</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;-webkit-text-size-adjust:100%}
button{cursor:pointer;border:none;border-radius:8px;font-weight:700;transition:opacity .15s;-webkit-tap-highlight-color:transparent}
button:hover{opacity:.85}
button:disabled{opacity:.4;cursor:not-allowed}
input,select{background:#0f172a;color:#f1f5f9;border:1px solid #334155;border-radius:8px;padding:9px 12px;font-size:16px;width:100%}
input:focus,select:focus{outline:2px solid #2563eb}
.card{background:#1e293b;border-radius:12px;padding:16px}
.tab-btn{padding:8px 12px;border-radius:8px;font-weight:700;font-size:13px;background:#1e293b;color:#f1f5f9}
.tab-btn.active{background:#2563eb}
.flash{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;padding:12px 20px;border-radius:10px;font-weight:700;z-index:999;box-shadow:0 4px 20px #0008;font-size:14px;width:90%;max-width:400px;text-align:center}
table{width:100%;border-collapse:collapse}
th{background:#0f172a;padding:9px 10px;text-align:left;font-size:12px;color:#94a3b8;font-weight:700}
td{padding:10px;border-top:1px solid #0f172a;font-size:13px}
tr:nth-child(even) td{background:#1a2744}
.spinner{display:inline-block;width:18px;height:18px;border:3px solid #334155;border-top-color:#38bdf8;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px}
.admin-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.admin-tabs::-webkit-scrollbar{display:none}
nav{background:#1e293b;border-bottom:2px solid #2563eb;position:sticky;top:0;z-index:100}
.nav-title{font-weight:800;font-size:18px;color:#38bdf8}
.nav-desktop{display:flex;align-items:center;gap:8px;padding:10px 16px;flex-wrap:wrap}
.nav-btn{padding:8px 14px;border-radius:6px;background:#1e293b;color:#f1f5f9;font-size:13px;font-weight:700;border:1px solid #334155}
.nav-btn.active{background:#2563eb;border-color:#2563eb}
.logout-btn{margin-left:auto;background:#dc2626;color:#fff;padding:8px 14px;border-radius:6px;font-size:13px;font-weight:700;border:none;cursor:pointer}
.nav-top{display:none;align-items:center;padding:10px 14px;gap:8px}
.nav-hamburger{background:none;border:1px solid #334155;color:#f1f5f9;padding:6px 10px;border-radius:6px;font-size:18px;line-height:1;cursor:pointer}
.nav-links{display:none;flex-direction:column;padding:8px 14px 12px;gap:6px;border-top:1px solid #1e3a5f}
.nav-links.open{display:flex}
.nav-links .nav-btn{width:100%;text-align:left;padding:10px 14px}
.nav-links .logout-btn{width:100%;text-align:left;padding:10px 14px;margin-left:0}
#app{max-width:1020px;margin:0 auto;padding:12px}
.team-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:500px){.team-grid{grid-template-columns:repeat(auto-fill,minmax(195px,1fr))}}
.team-btn{padding:10px 12px;border-radius:8px;text-align:left;font-size:13px;font-weight:600;background:#0f172a;color:#f1f5f9;border-left:3px solid #2563eb;width:100%}
.team-btn.taken{background:#1e1e2e;color:#475569;border-left-color:#ef4444}
.team-btn.used{background:#1e1e2e;color:#475569;border-left-color:#7c3aed}
.team-btn:disabled{cursor:not-allowed}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#1e293b;border-radius:14px;padding:28px 24px;max-width:380px;width:100%;box-shadow:0 8px 40px #0006;border:1px solid #334155}
.show-mobile{display:none}
@media(max-width:900px){
  .nav-desktop{display:none}
  .nav-top{display:flex}
  .hide-mobile{display:none}
  .show-mobile{display:inline}
  .card{padding:14px}
  td{padding:8px 6px;font-size:12px}
  th{padding:8px 6px;font-size:11px}
  h2{font-size:18px}
  h3{font-size:15px}
}
</style>
</head>
<body>
<nav id="nav"></nav>
<div id="flash-area"></div>
<div id="pick-modal" style="display:none" class="modal-overlay">
  <div class="modal-box">
    <div style="font-size:18px;font-weight:800;margin-bottom:8px;color:#f1f5f9">Confirm Your Pick</div>
    <div style="color:#94a3b8;font-size:14px;margin-bottom:16px">You are selecting:</div>
    <div id="modal-team" style="font-size:22px;font-weight:800;color:#38bdf8;margin-bottom:8px"></div>
    <div id="modal-week" style="color:#94a3b8;font-size:13px;margin-bottom:20px"></div>
    <div style="background:#0f172a;border-radius:8px;padding:10px 14px;margin-bottom:20px;color:#f59e0b;font-size:13px">This cannot be changed after confirming.</div>
    <div style="display:flex;gap:10px">
      <button onclick="closePickModal()" style="flex:1;padding:11px;background:#334155;color:#f1f5f9;font-size:15px">Cancel</button>
      <button onclick="confirmPick()" style="flex:1;padding:11px;background:#2563eb;color:#fff;font-size:15px">Confirm Pick</button>
    </div>
  </div>
</div>
<div id="app"><div style="text-align:center;padding:60px;color:#94a3b8"><span class="spinner"></span> Loading...</div></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

var firebaseConfig = {
  apiKey: "AIzaSyCY2yCDv1BjiMGwitmZwarjlx4wLSyXNYQ",
  authDomain: "baseball-runs-pool.firebaseapp.com",
  projectId: "baseball-runs-pool",
  storageBucket: "baseball-runs-pool.firebasestorage.app",
  messagingSenderId: "78861263916",
  appId: "1:78861263916:web:73a7fc2ba45676813b9d89"
};

var fbApp = initializeApp(firebaseConfig);
var db = getFirestore(fbApp);
var POOL_DOC = doc(db, "pool", "main");
var ADMIN_PW = "commissioner";
var MLB_TEAMS = [
  "Arizona Diamondbacks","Atlanta Braves","Baltimore Orioles","Boston Red Sox",
  "Chicago Cubs","Chicago White Sox","Cincinnati Reds","Cleveland Guardians",
  "Colorado Rockies","Detroit Tigers","Houston Astros","Kansas City Royals",
  "Los Angeles Angels","Los Angeles Dodgers","Miami Marlins","Milwaukee Brewers",
  "Minnesota Twins","New York Mets","New York Yankees","Athletics",
  "Philadelphia Phillies","Pittsburgh Pirates","San Diego Padres","San Francisco Giants",
  "Seattle Mariners","St. Louis Cardinals","Tampa Bay Rays","Texas Rangers",
  "Toronto Blue Jays","Washington Nationals"
];
var ABBREV = {
  "Arizona Diamondbacks":"ARI","Atlanta Braves":"ATL","Baltimore Orioles":"BAL",
  "Boston Red Sox":"BOS","Chicago Cubs":"CHC","Chicago White Sox":"CWS",
  "Cincinnati Reds":"CIN","Cleveland Guardians":"CLE","Colorado Rockies":"COL",
  "Detroit Tigers":"DET","Houston Astros":"HOU","Kansas City Royals":"KC",
  "Los Angeles Angels":"LAA","Los Angeles Dodgers":"LAD","Miami Marlins":"MIA",
  "Milwaukee Brewers":"MIL","Minnesota Twins":"MIN","New York Mets":"NYM",
  "New York Yankees":"NYY","Athletics":"ATH","Philadelphia Phillies":"PHI",
  "Pittsburgh Pirates":"PIT","San Diego Padres":"SD","San Francisco Giants":"SF",
  "Seattle Mariners":"SEA","St. Louis Cardinals":"STL","Tampa Bay Rays":"TB",
  "Texas Rangers":"TEX","Toronto Blue Jays":"TOR","Washington Nationals":"WSH"
};
var ROTATION = [0,5,4,2,7,1,3,6];
var appState = { data: null, user: null, view: "home" };
var scheduleCache = {};
var liveRunsCache = {};
var orderState = [];
var _researchSort = "games";
var _researchDir = "desc";

function defaultData() {
  return { seasonStart:"", weekCount:26, playerCount:8, rotation:[0,5,4,2,7,1,3,6], players:[], weeks:{} };
}

function getSeasonStart() {
  if (!appState.data || !appState.data.seasonStart) return null;
  var d = new Date(appState.data.seasonStart);
  // Parse as local date to avoid UTC offset shifting the day
  var parts = appState.data.seasonStart.split("-");
  d = new Date(Number(parts[0]), Number(parts[1])-1, Number(parts[2]));
  // Snap to next Monday if not already a Monday (0=Sun,1=Mon,...,6=Sat)
  var day = d.getDay();
  if (day !== 1) {
    var daysUntilMonday = day === 0 ? 1 : 8 - day;
    d.setDate(d.getDate() + daysUntilMonday);
  }
  return d;
}

async function saveData(d) { appState.data = d; await setDoc(POOL_DOC, d); }

function flash(msg, color) {
  if (!color) color = "#16a34a";
  document.getElementById("flash-area").innerHTML = '<div class="flash" style="background:' + color + '">' + msg + '</div>';
  setTimeout(function() { document.getElementById("flash-area").innerHTML = ""; }, 3000);
}

function weekCount() { return (appState.data && appState.data.weekCount) || 26; }

function weekDropdown(id, selected, onchange) {
  var max = weekCount();
  var opts = "";
  for (var i = 1; i <= max; i++) {
    opts += '<option value="' + i + '"' + (i === selected ? " selected" : "") + '>' + i + '</option>';
  }
  return '<select id="' + id + '" style="width:70px;font-size:14px;padding:6px 8px" onchange="' + onchange + '">' + opts + '</select>';
}

function currentWeek() {
  if (!appState.data || !appState.data.seasonStart) return 1;
  var start = getSeasonStart();
  var now = new Date();
  var diff = Math.floor((now - start) / (7*24*3600*1000));
  return Math.max(1, Math.min(diff+1, weekCount()));
}

function getDraftPosition(playerIndex, weekNum) {
  var rotation = (appState.data && appState.data.rotation) || ROTATION;
  var n = rotation.length;
  var startPos = -1;
  for (var i = 0; i < n; i++) {
    if (rotation[i] === playerIndex) { startPos = i; break; }
  }
  if (startPos < 0) return playerIndex % n;
  return rotation[(startPos + weekNum - 1) % n];
}

function orderedPlayers(weekNum) {
  var players = (appState.data && appState.data.players) || [];
  var hasOverride = false;
  for (var i = 0; i < players.length; i++) {
    if (players[i].draftOrder && players[i].draftOrder[weekNum] !== undefined) { hasOverride = true; break; }
  }
  var sorted = players.slice();
  if (hasOverride) {
    sorted.sort(function(a,b) {
      var as = (a.draftOrder && a.draftOrder[weekNum] !== undefined) ? a.draftOrder[weekNum] : 99;
      var bs = (b.draftOrder && b.draftOrder[weekNum] !== undefined) ? b.draftOrder[weekNum] : 99;
      return as - bs;
    });
  } else {
    sorted.sort(function(a,b) {
      return getDraftPosition(players.indexOf(a), weekNum) - getDraftPosition(players.indexOf(b), weekNum);
    });
  }
  return sorted;
}

function usedTeams(playerName) {
  var used = [];
  var weeks = (appState.data && appState.data.weeks) || {};
  for (var w in weeks) {
    if (weeks[w].picks && weeks[w].picks[playerName]) used.push(weeks[w].picks[playerName]);
  }
  return used;
}

function takenTeamsThisWeek(weekNum) {
  var taken = [];
  var picks = (appState.data && appState.data.weeks && appState.data.weeks[weekNum] && appState.data.weeks[weekNum].picks) || {};
  for (var p in picks) taken.push(picks[p]);
  return taken;
}

function playerHasPassword(player) {
  return !!(player && player.password && player.password.trim() !== "");
}

function getWeekWindow(weekNum) {
  if (!appState.data || !appState.data.seasonStart) return null;
  var start = getSeasonStart();
  var weekMonday = new Date(start);
  weekMonday.setDate(start.getDate() + (weekNum - 1) * 7);
  var friday = new Date(weekMonday); friday.setDate(weekMonday.getDate() - 3);
  var sunday = new Date(weekMonday); sunday.setDate(weekMonday.getDate() - 1);
  var testDate = new Date(friday.toISOString().split("T")[0] + "T12:00:00Z");
  var etHour = Number(testDate.toLocaleString("en-US", {timeZone:"America/New_York", hour:"numeric", hour12:false}));
  var utcHour = testDate.getUTCHours();
  var offset = utcHour - etHour;
  var openET     = new Date(Date.UTC(friday.getUTCFullYear(), friday.getUTCMonth(), friday.getUTCDate(),  0 + offset, 0, 0));
  var mondayBase = new Date(Date.UTC(sunday.getUTCFullYear(), sunday.getUTCMonth(), sunday.getUTCDate(), 14 + offset, 0, 0));
  var closeET    = new Date(Date.UTC(sunday.getUTCFullYear(), sunday.getUTCMonth(), sunday.getUTCDate(), 22 + offset, 0, 0));
  return { openET: openET, mondayBase: mondayBase, closeET: closeET };
}

function getPickDeadline(weekNum, slotIndex) {
  var win = getWeekWindow(weekNum);
  if (!win) return null;
  var d = new Date(win.mondayBase);
  d.setHours(d.getHours() + slotIndex + 1);
  return d;
}

function isDraftOpen(weekNum) {
  var win = getWeekWindow(weekNum);
  if (!win) return false;
  var now = new Date();
  return now >= win.openET && now < win.closeET;
}

function isWeekLocked(weekNum) {
  var win = getWeekWindow(weekNum);
  if (!win) return false;
  return new Date() >= win.closeET;
}

function activeDraftWeek() {
  var w = currentWeek();
  var next = w + 1;
  if (next <= weekCount() && isDraftOpen(next)) return next;
  // If next week already has picks (draft completed), show that week
  var nextPicks = (appState.data.weeks&&appState.data.weeks[next]&&appState.data.weeks[next].picks)||{};
  if (next <= weekCount() && Object.keys(nextPicks).length > 0) return next;
  return w;
}

function canPlayerPick(weekNum, playerName) {
  var now = new Date();
  var win = getWeekWindow(weekNum);
  if (!win) return { can: false, reason: "Season not configured." };
  if (now < win.openET) return { can: false, reason: "Draft opens " + formatET(win.openET) + " ET." };
  if (now >= win.closeET) return { can: false, reason: "The 10:00pm ET Sunday deadline has passed." };
  var picks = (appState.data.weeks && appState.data.weeks[weekNum] && appState.data.weeks[weekNum].picks) || {};
  if (picks[playerName]) return { can: false, reason: "You have already picked this week." };
  var ordered = orderedPlayers(weekNum);
  var slotIndex = -1;
  for (var i = 0; i < ordered.length; i++) { if (ordered[i].name === playerName) { slotIndex = i; break; } }
  if (slotIndex < 0) return { can: false, reason: "Player not found." };
  var myDeadline = getPickDeadline(weekNum, slotIndex);
  if (now >= myDeadline) return { can: false, reason: "Your pick window has closed. A default pick has been assigned." };
  for (var j = 0; j < slotIndex; j++) {
    var prevDeadline = getPickDeadline(weekNum, j);
    if (!picks[ordered[j].name] && now < prevDeadline) {
      return { can: false, reason: "Waiting for " + ordered[j].name + " to pick (deadline: " + formatET(prevDeadline) + " ET)." };
    }
  }
  return { can: true, reason: "", deadline: myDeadline, slotIndex: slotIndex };
}

async function processAutoPicks(weekNum) {
  var ordered = orderedPlayers(weekNum);
  var picks = (appState.data.weeks && appState.data.weeks[weekNum] && appState.data.weeks[weekNum].picks)
    ? JSON.parse(JSON.stringify(appState.data.weeks[weekNum].picks)) : {};
  var now = new Date();
  var changed = false;
  var gameCounts = await fetchScheduleFromAPI(weekNum);
  for (var i = 0; i < ordered.length; i++) {
    var p = ordered[i];
    if (picks[p.name]) continue;
    var deadline = getPickDeadline(weekNum, i);
    if (now < deadline) continue;
    var taken = []; for (var pl in picks) taken.push(picks[pl]);
    var used = usedTeams(p.name);
    var defaultTeam = null;
    for (var t = 0; t < MLB_TEAMS.length; t++) {
      var team = MLB_TEAMS[t];
      if (taken.indexOf(team) >= 0 || used.indexOf(team) >= 0) continue;
      var games = gameCounts[team] !== undefined ? parseFloat(gameCounts[team]) : 0;
      if (games >= 6) { defaultTeam = team; break; }
    }
    if (!defaultTeam) {
      for (var t2 = 0; t2 < MLB_TEAMS.length; t2++) {
        var team2 = MLB_TEAMS[t2];
        if (taken.indexOf(team2) >= 0 || used.indexOf(team2) >= 0) continue;
        defaultTeam = team2; break;
      }
    }
    if (defaultTeam) { picks[p.name] = defaultTeam; changed = true; }
  }
  if (changed) {
    var d = JSON.parse(JSON.stringify(appState.data));
    d.weeks = d.weeks || {}; d.weeks[weekNum] = d.weeks[weekNum] || {};
    d.weeks[weekNum].picks = picks;
    await saveData(d);
  }
}

function formatET(date) {
  return date.toLocaleString("en-US", { timeZone:"America/New_York", weekday:"short", month:"short", day:"numeric", hour:"numeric", minute:"2-digit", hour12:true });
}

function calcWeekStandings(weekNum, overrideRuns) {
  var picks = (appState.data.weeks && appState.data.weeks[weekNum] && appState.data.weeks[weekNum].picks) || {};
  var savedRuns = (appState.data.weeks && appState.data.weeks[weekNum] && appState.data.weeks[weekNum].runs) || {};
  var runs = overrideRuns || savedRuns;
  var players = (appState.data && appState.data.players) || [];
  var rows = [];
  for (var i = 0; i < players.length; i++) {
    var p = players[i];
    var team = picks[p.name] || null;
    var playerRuns = null;
    if (team !== null) playerRuns = (runs[team] !== undefined && runs[team] !== null) ? runs[team] : 0;
    rows.push({ name: p.name, team: team, runs: playerRuns, payout: null });
  }
  rows.sort(function(a,b) { return (b.runs !== null ? b.runs : -9999) - (a.runs !== null ? a.runs : -9999); });
  var withPicks = rows.filter(function(r) { return r.runs !== null; });
  if (withPicks.length > 0) {
    var topRuns = withPicks[0].runs;
    var winners = withPicks.filter(function(r) { return r.runs === topRuns; });
    var losers  = withPicks.filter(function(r) { return r.runs !== topRuns; });
    // Each loser pays 2x the difference vs the top score
    var totalPot = 0;
    losers.forEach(function(r) {
      var owed = (topRuns - r.runs) * 2;
      r.payout = -owed;
      totalPot += owed;
    });
    // Winners split the pot equally
    var winnerShare = totalPot / winners.length;
    winners.forEach(function(r) { r.payout = winnerShare; });
  }
  return rows;
}

function calcSeasonStandings() {
  var totals = {};
  var players = (appState.data && appState.data.players) || [];
  for (var i = 0; i < players.length; i++) totals[players[i].name] = { name: players[i].name, totalRuns: 0, totalWinnings: 0, weeks: 0, wins: 0 };
  for (var w = 1; w <= weekCount(); w++) {
    // Only count weeks where runs have been saved by admin
    var savedRuns = (appState.data.weeks && appState.data.weeks[w] && appState.data.weeks[w].runs) || {};
    if (Object.keys(savedRuns).length === 0) continue;
    var ws = calcWeekStandings(w);
    var withRuns = ws.filter(function(r) { return r.runs !== null; });
    var maxRuns = withRuns.length > 0 ? Math.max.apply(null, withRuns.map(function(r) { return r.runs; })) : null;
    ws.forEach(function(r) {
      if (!totals[r.name]) return;
      if (r.runs !== null) {
        totals[r.name].totalRuns += r.runs;
        totals[r.name].weeks++;
        if (r.runs === maxRuns) totals[r.name].wins++;
      }
      if (r.payout !== null) totals[r.name].totalWinnings += r.payout;
    });
  }
  var result = Object.values(totals);
  result.sort(function(a,b) { return b.totalWinnings - a.totalWinnings || b.totalRuns - a.totalRuns; });
  return result;
}

async function fetchRunsFromAPI(w) {
  if (!appState.data || !appState.data.seasonStart) return {};
  try {
    var start = getSeasonStart();
    var ws = new Date(start); ws.setDate(start.getDate() + (w-1)*7);
    var we = new Date(ws); we.setDate(ws.getDate() + 6);
    function fmt(d) { return d.toISOString().split("T")[0]; }
    var url = "https://statsapi.mlb.com/api/v1/schedule?sportId=1&startDate=" + fmt(ws) + "&endDate=" + fmt(we) + "&gameType=R&fields=dates,games,teams,away,home,team,name,score,status,abstractGameState,detailedState";
    var res = await fetch(url); var json = await res.json();
    var totals = {};
    (json.dates||[]).forEach(function(de) {
      (de.games||[]).forEach(function(g) {
        var detail = (g.status && g.status.detailedState) ? g.status.detailedState.toLowerCase() : "";
        var isFinal = g.status && g.status.abstractGameState === "Final";
        var isSusp = detail.indexOf("suspended") >= 0 || detail.indexOf("resume") >= 0;
        if (!isFinal && !isSusp) return;
        var aw = g.teams && g.teams.away; var hm = g.teams && g.teams.home;
        if (aw && aw.team && aw.team.name) totals[aw.team.name] = (totals[aw.team.name]||0) + (aw.score||0);
        if (hm && hm.team && hm.team.name) totals[hm.team.name] = (totals[hm.team.name]||0) + (hm.score||0);
      });
    });
    return totals;
  } catch(e) { return {}; }
}

async function fetchScheduleFromAPI(w) {
  if (scheduleCache[w]) return scheduleCache[w];
  if (!appState.data || !appState.data.seasonStart) return {};
  try {
    var start = getSeasonStart();
    var ws = new Date(start); ws.setDate(start.getDate() + (w-1)*7);
    var we = new Date(ws); we.setDate(ws.getDate() + 6);
    function fmt(d) { return d.toISOString().split("T")[0]; }
    var url = "https://statsapi.mlb.com/api/v1/schedule?sportId=1&startDate=" + fmt(ws) + "&endDate=" + fmt(we) + "&gameType=R&fields=dates,games,teams,away,home,team,name,status,abstractGameState,detailedState";
    var res = await fetch(url); var json = await res.json();
    var counts = {};
    (json.dates||[]).forEach(function(de) {
      (de.games||[]).forEach(function(g) {
        var detail = (g.status && g.status.detailedState) ? g.status.detailedState.toLowerCase() : "";
        var isSusp = detail.indexOf("suspended") >= 0 || detail.indexOf("resume") >= 0;
        var val = isSusp ? 0.5 : 1;
        var aw = g.teams && g.teams.away && g.teams.away.team && g.teams.away.team.name;
        var hm = g.teams && g.teams.home && g.teams.home.team && g.teams.home.team.name;
        if (aw) counts[aw] = (counts[aw]||0) + val;
        if (hm) counts[hm] = (counts[hm]||0) + val;
      });
    });
    var formatted = {};
    for (var team in counts) formatted[team] = (counts[team] % 1 === 0) ? counts[team] : counts[team].toFixed(1);
    scheduleCache[w] = formatted;
    return formatted;
  } catch(e) { return {}; }
}

async function fetchCompletedGames(w) {
  if (!appState.data || !appState.data.seasonStart) return {};
  try {
    var start = getSeasonStart();
    var ws = new Date(start); ws.setDate(start.getDate() + (w-1)*7);
    var we = new Date(ws); we.setDate(ws.getDate() + 6);
    function fmt(d) { return d.toISOString().split("T")[0]; }
    var url = "https://statsapi.mlb.com/api/v1/schedule?sportId=1&startDate=" + fmt(ws) + "&endDate=" + fmt(we) + "&gameType=R&fields=dates,games,teams,away,home,team,name,status,abstractGameState,detailedState";
    var res = await fetch(url); var json = await res.json();
    var counts = {};
    (json.dates||[]).forEach(function(de) {
      (de.games||[]).forEach(function(g) {
        var detail = (g.status && g.status.detailedState) ? g.status.detailedState.toLowerCase() : "";
        var isFinal = g.status && g.status.abstractGameState === "Final";
        var isSusp = detail.indexOf("suspended") >= 0;
        if (!isFinal && !isSusp) return;
        var val = isSusp ? 0.5 : 1;
        var aw = g.teams && g.teams.away && g.teams.away.team && g.teams.away.team.name;
        var hm = g.teams && g.teams.home && g.teams.home.team && g.teams.home.team.name;
        if (aw) counts[aw] = (counts[aw]||0) + val;
        if (hm) counts[hm] = (counts[hm]||0) + val;
      });
    });
    return counts;
  } catch(e) { return {}; }
}

window.loginPlayer = async function() {
  var el = document.getElementById("player-select");
  var errEl = document.getElementById("player-pw-error");
  if (!el || !el.value) { if (errEl) errEl.textContent = "Please select your name."; return; }
  var name = el.value;
  var player = (appState.data.players||[]).find(function(p) { return p.name === name; });
  if (!player) { errEl.textContent = "Player not found."; return; }
  if (!playerHasPassword(player)) {
    var pw1El = document.getElementById("player-pw-new");
    var pw2El = document.getElementById("player-pw-confirm");
    if (!pw1El || !pw2El) { checkPlayerPw(); errEl.textContent = "Please set your password first."; return; }
    var pw1 = pw1El.value || "";
    var pw2 = pw2El.value || "";
    if (!pw1) { errEl.textContent = "Please choose a password."; return; }
    if (pw1.length < 4) { errEl.textContent = "Password must be at least 4 characters."; return; }
    if (pw1 !== pw2) { errEl.textContent = "Passwords don't match."; return; }
    var d = JSON.parse(JSON.stringify(appState.data));
    var idx = d.players.findIndex(function(p) { return p.name === name; });
    if (idx < 0) { errEl.textContent = "Error saving password."; return; }
    d.players[idx].password = pw1;
    await saveData(d);
    flash("Password set! Welcome, " + name + "!");
  } else {
    var pwEl = document.getElementById("player-pw");
    if (!pwEl) { checkPlayerPw(); errEl.textContent = "Please enter your password."; return; }
    var pw = pwEl.value || "";
    if (!pw) { errEl.textContent = "Please enter your password."; return; }
    if (pw !== player.password) { errEl.textContent = "Incorrect password."; return; }
  }
  errEl.textContent = "";
  appState.user = { name: name, isAdmin: false };
  appState.view = isDraftOpen(activeDraftWeek()) ? "player" : "home";
  render();
};

window.saveSetup = async function() {
  var wc = Number(document.getElementById("week-count").value);
  var d = JSON.parse(JSON.stringify(appState.data));
  d.weekCount = wc;
  var weeks = appState.data.weeks || {};
  var seasonActive = false;
  for (var w in weeks) {
    if ((weeks[w].picks && Object.keys(weeks[w].picks).length > 0) ||
        (weeks[w].runs  && Object.keys(weeks[w].runs).length  > 0)) { seasonActive = true; break; }
  }
  if (!seasonActive) {
    d.seasonStart = document.getElementById("season-start").value;
    var pc = Number(document.getElementById("player-count").value);
    var rotRaw = document.getElementById("rotation-input").value;
    var rotParsed = rotRaw.split(",").map(function(s) { return parseInt(s.trim(), 10); });
    if (rotParsed.some(isNaN)) { flash("Rotation must be numbers separated by commas.", "#dc2626"); return; }
    if (rotParsed.length !== pc) { flash("Rotation must have exactly " + pc + " numbers.", "#dc2626"); return; }
    var sorted = rotParsed.slice().sort(function(a,b){return a-b;});
    for (var i = 0; i < sorted.length; i++) {
      if (sorted[i] !== i+1) { flash("Rotation must contain each position from 1 to " + pc + " exactly once.", "#dc2626"); return; }
    }
    d.playerCount = pc;
    d.rotation = rotParsed.map(function(n) { return n-1; });
  }
  await saveData(d); flash("Season settings saved!");
};

function renderAlertsPanel(name) {
  var player = (appState.data.players||[]).find(function(p){return p.name===name;});
  var phone = (player&&player.phone)||"";
  var alerts = (player&&player.alerts)||{};

  function toggle(id, label, checked, disabled) {
    var bg = checked ? "#2563eb" : "#334155";

      '<span style="font-size:14px;color:#f1f5f9">'+label+'</span>' +

      '<div style="width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:2px;transform:'+knob+';transition:transform .2s"></div></div></div>';
  }

  return '<div id="player-alerts" style="display:none"><div class="card">' +
    '<h3 style="font-weight:700;margin-bottom:4px">Text Alerts</h3>' +
    '<p style="color:#94a3b8;font-size:13px;margin-bottom:16px">Get SMS notifications sent to your phone. Enter your number and choose which alerts you want.</p>' +
    '<div style="margin-bottom:16px">' +
    '<label style="color:#94a3b8;font-size:12px;font-weight:700;margin-bottom:4px;display:block">Phone Number</label>' +
    '<div style="display:flex;gap:8px">' +
    '<input id="alert-phone" type="tel" placeholder="e.g. 9145551234" value="'+phone+'" style="flex:1" />' +
    '<button onclick="saveAlertPhone()" style="padding:9px 16px;background:#2563eb;color:#fff;font-size:14px;white-space:nowrap">Save</button>' +
    '</div>' +
    '<div id="alert-phone-status" style="font-size:12px;margin-top:4px;color:#94a3b8">'+(hasPhone?'✓ Phone saved':'Enter your 10-digit phone number')+'</div>' +
    '</div>' +
    '<div style="margin-bottom:4px;font-weight:700;font-size:13px;color:#94a3b8">CHOOSE YOUR ALERTS</div>' +
    toggle("dailyStandings","Daily Standings (7am ET)",dailyStandings,!hasPhone) +
    toggle("yourTurn","Your Turn to Pick",yourTurn,!hasPhone) +
    toggle("deadlineReminder","1-Hour Deadline Reminder",deadlineReminder,!hasPhone) +
    (!hasPhone?'<div style="color:#f59e0b;font-size:12px;margin-top:10px">Save your phone number to enable alerts.</div>':'') +

window.saveAlertPhone = async function() {
  var el = document.getElementById("alert-phone");
  var statusEl = document.getElementById("alert-phone-status");
  if (!el) return;
  var raw = el.value.replace(/\D/g,"");
  if (raw.length===11 && raw[0]==="1") raw = raw; // keep country code
  else if (raw.length===10) raw = "1"+raw;
  else { statusEl.textContent="Enter a valid 10-digit US phone number."; statusEl.style.color="#ef4444"; return; }
  var name = appState.user.name;
  var d = JSON.parse(JSON.stringify(appState.data));
  var idx = d.players.findIndex(function(p){return p.name===name;});
  if (idx<0) return;
  d.players[idx].phone = raw;
  if (!d.players[idx].alerts) d.players[idx].alerts = {dailyStandings:false,yourTurn:false,deadlineReminder:false};
  await saveData(d);
  flash("Phone number saved!");
};

window.toggleAlert = async function(alertType) {
  var name = appState.user.name;
  var d = JSON.parse(JSON.stringify(appState.data));
  var idx = d.players.findIndex(function(p){return p.name===name;});
  if (idx<0) return;
  var phone = d.players[idx].phone||"";
  if (phone.replace(/\D/g,"").length<10) { flash("Save your phone number first.","#dc2626"); return; }
  if (!d.players[idx].alerts) d.players[idx].alerts = {dailyStandings:false,yourTurn:false,deadlineReminder:false};
  d.players[idx].alerts[alertType] = !d.players[idx].alerts[alertType];
  await saveData(d);
  var status = d.players[idx].alerts[alertType] ? "ON" : "OFF";
  flash(alertType.replace(/([A-Z])/g," $1").trim()+" alert: "+status);
};

async function loadDraftTable(w) {
  var el=document.getElementById("draft-table"); if (!el) return;
  el.innerHTML='<div style="color:#94a3b8;padding:16px"><span class="spinner"></span> Loading schedule...</div>';
  var ordered=orderedPlayers(w);
  var picks=(appState.data.weeks&&appState.data.weeks[w]&&appState.data.weeks[w].picks)||{};
  var runs=(appState.data.weeks&&appState.data.weeks[w]&&appState.data.weeks[w].runs)||{};
  var games=await fetchScheduleFromAPI(w);
  var win=getWeekWindow(w);
  if (!ordered.length) { el.innerHTML='<p style="color:#94a3b8">No players configured yet.</p>'; return; }
  var rows=ordered.map(function(p,i) {
    var team=picks[p.name]||null, r=(team&&runs[team]!==undefined)?runs[team]:null, g=team?(games[team]!==undefined?games[team]:"--"):"--";
    var deadline=getPickDeadline(w,i);

    var raSplits = (raJson.stats && raJson.stats[0] && raJson.stats[0].splits) || [];
    rsSplits.forEach(function(s) { if (s.team&&s.team.name) rsMap[s.team.name] = s.stat&&s.stat.runs!==undefined ? s.stat.runs : "--"; });

    // Tim-only data: recent R/G and opponent bullpen ERA

    if (isTim && recentJson) {

      }
      teamRows+='<tr style="'+rowStyle+'">' +
        '<td style="font-weight:600;white-space:nowrap"><span class="hide-mobile">'+item.name+'</span><span class="show-mobile">'+abbrev(item.name)+'</span>'+badge+'</td>' +
        '<td style="text-align:center;font-weight:700;color:#34d399">'+item.rs+'</td>' +
        '<td style="text-align:center;font-weight:700;color:#f87171">'+item.ra+'</td>' +
        '<td style="text-align:center;font-weight:800;color:'+tc+'">'+item.total+'</td>' +
        scoreCell;
      for (var dc=0;dc<7;dc++) teamRows+='<td style="text-align:center;font-size:12px;line-height:1.4">'+cellContent(item.sched[dc])+'</td>';
      teamRows+='</tr>';
    });

    el.innerHTML='<div style="color:#94a3b8;font-size:12px;margin-bottom:10px">Week '+w+': '+fmt(days[0])+' to '+fmt(days[6])+'</div>' +
      '<div style="font-size:12px;margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap">' +
      '<span style="color:#16a34a;font-weight:700">7+ games</span>' +
      '<span style="color:#fbbf24;font-weight:700">5-6 games</span>' +
      '<span style="color:#ef4444;font-weight:700">Under 5</span>' +
      '<span style="color:#94a3b8">@ = Away | Two opponents = Doubleheader</span>' +
      '<span style="color:#34d399;font-weight:700">RS = Runs Scored</span>' +
      '<span style="color:#f87171;font-weight:700">RA = Runs Allowed</span>' +
      '<span style="background:#16a34a33;border:1px solid #16a34a;padding:1px 6px;border-radius:4px;color:#86efac;font-size:11px">my pick = this week</span>' +
      '<span style="background:#7c3aed22;border:1px solid #7c3aed;padding:1px 6px;border-radius:4px;color:#c4b5fd;font-size:11px">drafted = taken by another player</span>' +
      '<span style="background:#47556944;border:1px solid #475569;padding:1px 6px;border-radius:4px;color:#cbd5e1;font-size:11px">used = you used earlier this season</span></div>' +
      '<div class="table-wrap"><table><thead>'+hdr+'</thead><tbody>'+teamRows+'</tbody></table></div>';

  } catch(e) { el.innerHTML='<p style="color:#ef4444;padding:16px">Failed to load schedule. Please try again.</p>'; }
}
window.loadResearchTable = loadResearchTable;
window.refreshResearch = function() {
  var w=Number(document.getElementById("research-week").value);
  delete scheduleCache[w];
  loadResearchTable(w);
};

var BACKTEST_PARK_FACTORS = {
  "Colorado Rockies":1.3,"Boston Red Sox":1.1,"Cincinnati Reds":1.1,
  "Philadelphia Phillies":1.08,"Texas Rangers":1.07,"Arizona Diamondbacks":1.06,
  "Chicago Cubs":1.05,"Toronto Blue Jays":1.04,"Atlanta Braves":1.03,
  "Milwaukee Brewers":1.03,"Los Angeles Angels":1.02,"Minnesota Twins":1.02,
  "Baltimore Orioles":1.01,"New York Yankees":1.01,"Kansas City Royals":1.0,
  "St. Louis Cardinals":1.0,"Washington Nationals":1.0,"Detroit Tigers":0.99,
  "Chicago White Sox":0.98,"Houston Astros":0.98,"San Francisco Giants":0.98,
  "Cleveland Guardians":0.97,"Pittsburgh Pirates":0.97,"San Diego Padres":0.97,
  "Los Angeles Dodgers":0.96,"New York Mets":0.96,"Seattle Mariners":0.96,
  "Tampa Bay Rays":0.95,"Miami Marlins":0.94,"Athletics":0.96
};

async function backtestWeek(weekNum) {
  var start = getSeasonStart();
  var ws = new Date(start); ws.setDate(start.getDate() + (weekNum-1)*7);
  var we = new Date(ws); we.setDate(ws.getDate() + 6);
  function fmt(d) { return d.toISOString().split("T")[0]; }
  var season = start.getFullYear();
  var recentStart = new Date(ws.getTime() - 14*86400000);

  var schedUrl = "https://statsapi.mlb.com/api/v1/schedule?sportId=1&startDate="+fmt(ws)+"&endDate="+fmt(we)+"&gameType=R&fields=dates,date,games,teams,away,home,team,name,score,status,abstractGameState,detailedState";
  var recentUrl = "https://statsapi.mlb.com/api/v1/teams/stats?season="+season+"&sportId=1&stats=byDateRange&group=hitting&startDate="+fmt(recentStart)+"&endDate="+fmt(ws);
  var bpUrl = "https://statsapi.mlb.com/api/v1/teams/stats?season="+season+"&sportId=1&stats=season&group=pitching&gameType=R";

  var results = await Promise.all([fetch(schedUrl), fetch(recentUrl), fetch(bpUrl)]);
  var schedJson = await results[0].json();
  var recentJson = await results[1].json();
  var bpJson = await results[2].json();

  // Recent R/G
  var recentRgMap = {};
  var rsSplits = (recentJson.stats && recentJson.stats[0] && recentJson.stats[0].splits) || [];
  rsSplits.forEach(function(s) {
    if (s.team && s.team.name && s.stat) {
      var gp = s.stat.gamesPlayed || 1;
      recentRgMap[s.team.name] = (s.stat.runs || 0) / gp;
    }
  });

  // Bullpen ERA
  var bullpenEraMap = {};
  var bpSplits = (bpJson.stats && bpJson.stats[0] && bpJson.stats[0].splits) || [];
  bpSplits.forEach(function(s) {
    if (s.team && s.team.name && s.stat && s.stat.era !== undefined) {
      bullpenEraMap[s.team.name] = parseFloat(s.stat.era);
    }
  });

  // Build schedule and actual runs
  var teamData = {};
  (schedJson.dates || []).forEach(function(de) {
    (de.games || []).forEach(function(g) {
      var aw = g.teams && g.teams.away && g.teams.away.team && g.teams.away.team.name;
      var hm = g.teams && g.teams.home && g.teams.home.team && g.teams.home.team.name;
      if (!aw || !hm) return;
      if (!teamData[aw]) teamData[aw] = { games:0, homeGames:0, opps:[], actual:0 };
      if (!teamData[hm]) teamData[hm] = { games:0, homeGames:0, opps:[], actual:0 };
      teamData[aw].games++; teamData[hm].games++;
      teamData[hm].homeGames++;
      teamData[aw].opps.push({ opp:hm, isHome:false });
      teamData[hm].opps.push({ opp:aw, isHome:true });
      var detail = (g.status && g.status.detailedState) ? g.status.detailedState.toLowerCase() : "";
      var isFinal = g.status && g.status.abstractGameState === "Final";
      var isSusp = detail.indexOf("suspended") >= 0;
      if (isFinal || isSusp) {
        teamData[aw].actual += (g.teams.away.score || 0);
        teamData[hm].actual += (g.teams.home.score || 0);
      }
    });
  });

  // Compute raw composite scores
  var teams = [];
  for (var team in teamData) {
    var td = teamData[team];
    if (td.games === 0) continue;
    var recentRg = recentRgMap[team] || 4.0;
    var recentScore = Math.min(recentRg / 7.0, 1.0) * 30;
    var gamesScore = Math.min(td.games / 7.0, 1.0) * 30;
    var avgOppBpEra = 0, oppCount = 0;
    td.opps.forEach(function(o) {
      if (bullpenEraMap[o.opp] !== undefined) { avgOppBpEra += bullpenEraMap[o.opp]; oppCount++; }
    });
    avgOppBpEra = oppCount > 0 ? avgOppBpEra / oppCount : 4.0;
    var bpScore = Math.min(avgOppBpEra / 6.0, 1.0) * 20;
    var homeRatio = td.homeGames / td.games;
    var avgPF = 0, pfC = 0;
    td.opps.forEach(function(o) {
      var park = o.isHome ? team : o.opp;
      avgPF += BACKTEST_PARK_FACTORS[park] || 1.0; pfC++;
    });
    avgPF = pfC > 0 ? avgPF / pfC : 1.0;
    var homeScore = (homeRatio * 0.5 + (avgPF - 0.9) * 2.5) * 20;
    homeScore = Math.max(0, Math.min(homeScore, 20));
    var rawScore = recentScore + gamesScore + bpScore + homeScore;
    teams.push({ name:team, games:td.games, rawScore:rawScore, actual:td.actual });
  }

  // Convert to projected runs using fixed scale: raw 40 = 20 runs, raw 80 = 45 runs
  teams.forEach(function(t) {
    t.projected = Math.round((20 + (t.rawScore - 40) * 0.625) * 10) / 10;
  });
  teams.sort(function(a,b) { return b.projected - a.projected; });
  return { weekNum:weekNum, start:fmt(ws), end:fmt(we), teams:teams };
}

window.runBacktest = async function() {
  var el = document.getElementById("backtest-results"); if (!el) return;
  var btn = document.getElementById("backtest-btn");
  if (btn) { btn.innerHTML = '<span class="spinner"></span>Running...'; btn.disabled = true; }
  el.innerHTML = '<div style="color:#94a3b8;padding:16px"><span class="spinner"></span> Running backtest on recent weeks...</div>';

  var cw = currentWeek();
  var weeksToTest = [];
  for (var w = Math.max(1, cw - 4); w < cw; w++) weeksToTest.push(w);

  try {
    var allResults = [];
    for (var i = 0; i < weeksToTest.length; i++) {
      allResults.push(await backtestWeek(weeksToTest[i]));
    }

    var html = '';
    var overallErrors = [], overallTop5Edge = 0, top5Count = 0;

    allResults.forEach(function(wk) {
      var teams = wk.teams;
      var n = teams.length; if (n === 0) return;

      // Stats
      var sumXY=0, sumX=0, sumY=0, sumX2=0, sumY2=0, totalErr=0;
      teams.forEach(function(t) {
        sumX+=t.projected; sumY+=t.actual;
        sumXY+=t.projected*t.actual;
        sumX2+=t.projected*t.projected;
        sumY2+=t.actual*t.actual;
        totalErr+=Math.abs(t.projected-t.actual);
        overallErrors.push(Math.abs(t.projected-t.actual));
      });
      var corr = (n*sumXY-sumX*sumY) / Math.sqrt((n*sumX2-sumX*sumX)*(n*sumY2-sumY*sumY));
      if (isNaN(corr)) corr = 0;
      var mae = totalErr / n;
      var avgActual = sumY / n;
      var top5 = teams.slice(0, 5);
      var top5avg = top5.reduce(function(s,t){return s+t.actual;},0) / 5;
      var edge = top5avg - avgActual;
      overallTop5Edge += edge; top5Count++;

      // Rank actual to find where our top 5 projected landed
      var sortedByActual = teams.slice().sort(function(a,b){return b.actual-a.actual;});
      var actualRankMap = {};
      sortedByActual.forEach(function(t,i){actualRankMap[t.name]=i+1;});

      html += '<div class="card" style="margin-bottom:16px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">' +
        '<div style="font-weight:800;color:#38bdf8;font-size:15px">Week '+wk.weekNum+': '+wk.start+' to '+wk.end+'</div>' +
        '<div style="display:flex;gap:16px;font-size:12px">' +
        '<span style="color:#94a3b8">Corr: <strong style="color:'+(corr>=0.3?'#16a34a':corr>=0.1?'#fbbf24':'#ef4444')+'">'+corr.toFixed(3)+'</strong></span>' +
        '<span style="color:#94a3b8">MAE: <strong style="color:#f59e0b">'+mae.toFixed(1)+'</strong></span>' +
        '<span style="color:#94a3b8">Top 5 edge: <strong style="color:'+(edge>0?'#16a34a':'#ef4444')+'">'+(edge>=0?'+':'')+edge.toFixed(1)+' runs</strong></span>' +
        '</div></div>';

      // Top 5 projected table
      html += '<div style="font-size:12px;color:#94a3b8;margin-bottom:6px;font-weight:600">Top 5 Projected</div>' +
        '<div class="table-wrap"><table style="margin-bottom:10px">' +
        '<thead><tr><th>#</th><th>Team</th><th style="text-align:center">Games</th><th style="text-align:right">Proj R</th><th style="text-align:right">Actual</th><th style="text-align:right">Diff</th><th style="text-align:center">Actual Rank</th></tr></thead><tbody>';
      top5.forEach(function(t,i) {
        var diff = t.actual - t.projected;
        var dc = diff >= 0 ? '#16a34a' : '#ef4444';
        var ar = actualRankMap[t.name] || '--';
        var arc = ar <= 5 ? '#16a34a' : ar <= 10 ? '#fbbf24' : '#ef4444';
        html += '<tr><td style="color:#38bdf8;font-weight:800">'+(i+1)+'</td>' +
          '<td style="font-weight:600">'+t.name+'</td>' +
          '<td style="text-align:center">'+t.games+'</td>' +
          '<td style="text-align:right;color:#94a3b8">'+t.projected.toFixed(1)+'</td>' +
          '<td style="text-align:right;font-weight:700;color:#fbbf24">'+t.actual+'</td>' +
          '<td style="text-align:right;font-weight:700;color:'+dc+'">'+(diff>=0?'+':'')+diff.toFixed(1)+'</td>' +
          '<td style="text-align:center;font-weight:700;color:'+arc+'">'+ar+'/'+n+'</td></tr>';
      });
      html += '</tbody></table></div>';

      // Actual top 5 (who we missed)
      html += '<div style="font-size:12px;color:#94a3b8;margin-bottom:6px;font-weight:600">Actual Top 5</div>' +
        '<div class="table-wrap"><table style="margin-bottom:4px">' +
        '<thead><tr><th>#</th><th>Team</th><th style="text-align:center">Games</th><th style="text-align:right">Proj R</th><th style="text-align:right">Actual</th></tr></thead><tbody>';
      sortedByActual.slice(0,5).forEach(function(t,i) {
        var inTop5Proj = top5.some(function(p){return p.name===t.name;});
        html += '<tr style="'+(inTop5Proj?'background:#16a34a18':'')+'">' +
          '<td style="color:#fbbf24;font-weight:800">'+(i+1)+'</td>' +
          '<td style="font-weight:600">'+t.name+(inTop5Proj?' <span style="font-size:10px;background:#16a34a;padding:1px 5px;border-radius:4px;color:#fff">predicted</span>':'')+'</td>' +
          '<td style="text-align:center">'+t.games+'</td>' +
          '<td style="text-align:right;color:#94a3b8">'+t.projected.toFixed(1)+'</td>' +
          '<td style="text-align:right;font-weight:700;color:#fbbf24">'+t.actual+'</td></tr>';
      });
      html += '</tbody></table></div></div>';
    });

    // Overall summary
    if (top5Count > 0) {
      var overallMAE = overallErrors.reduce(function(s,v){return s+v;},0) / overallErrors.length;
      var avgEdge = overallTop5Edge / top5Count;
      html = '<div style="background:#0f172a;border:1px solid #334155;border-radius:10px;padding:14px 18px;margin-bottom:18px">' +
        '<div style="font-weight:800;color:#f1f5f9;font-size:15px;margin-bottom:8px">Backtest Summary ('+allResults.length+' weeks)</div>' +
        '<div style="display:flex;gap:24px;flex-wrap:wrap;font-size:13px">' +
        '<div style="color:#94a3b8">Avg MAE: <strong style="color:#f59e0b">'+overallMAE.toFixed(1)+' runs</strong></div>' +
        '<div style="color:#94a3b8">Avg Top 5 edge: <strong style="color:'+(avgEdge>0?'#16a34a':'#ef4444')+'">'+(avgEdge>=0?'+':'')+avgEdge.toFixed(1)+' runs vs avg</strong></div>' +
        '</div></div>' + html;
    }

    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div style="color:#ef4444;padding:16px">Backtest failed: '+e.message+'. Try again.</div>';
  }
  if (btn) { btn.innerHTML = 'Backtest'; btn.disabled = false; }
};

onSnapshot(POOL_DOC, function(snap) {
  appState.data = snap.exists() ? snap.data() : defaultData();
  render();
});
